<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT STUDIO 饮水机</title>
  <style>
    :root {
      --bg: #000000;
      --card: #000000;
      --accent: #34c759;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.4);
    }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 48px;
      padding: 56px 32px 40px;
      width: 280px;
      text-align: center;
      position: relative;
    }

    .header { margin-bottom: 56px; }
    
    .icon-box {
      font-size: 5.5rem;
      margin-bottom: 20px;
      display: inline-block;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin: 0;
      letter-spacing: -0.5px;
    }

    /* Switch */
    .switch-container {
      display: flex;
      justify-content: center;
      margin-bottom: 48px;
    }

    .ios-switch {
      position: relative;
      display: inline-block;
      width: 110px;
      height: 64px;
    }

    .ios-switch input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: #2c2c2e;
      transition: .4s;
      border-radius: 64px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 56px;
      width: 56px;
      left: 4px;
      bottom: 4px;
      background-color: #ffffff;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider { background-color: var(--accent); }
    input:checked + .slider:before { transform: translateX(46px); }

    /* Scheduler Section */
    .scheduler {
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 24px;
      text-align: left;
    }

    .schedule-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .schedule-title { font-size: 0.9rem; font-weight: 600; opacity: 0.8; }

    .mini-switch {
      width: 44px;
      height: 26px;
    }

    .mini-switch .slider:before {
      height: 22px;
      width: 22px;
      left: 2px;
      bottom: 2px;
    }

    .mini-switch input:checked + .slider:before {
      transform: translateX(18px);
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .time-picker {
      background: #1c1c1e;
      border: none;
      color: #fff;
      font-family: inherit;
      font-size: 0.85rem;
      padding: 4px 8px;
      border-radius: 6px;
      cursor: pointer;
    }

    /* Loading Overlay */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.8);
      border-radius: 48px;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

  </style>
</head>
<body>

<div class="container">
  <div class="loading-overlay" id="loader">
    <div class="spinner"></div>
  </div>

  <div class="header">
    <div class="icon-box" id="deviceIcon">💤</div>
    <h1>IT 工作室饮水机</h1>
  </div>

  <div class="switch-container">
    <label class="ios-switch">
      <input type="checkbox" id="powerSwitch" onchange="handleToggle()">
      <span class="slider"></span>
    </label>
  </div>

  <div class="scheduler">
    <div class="schedule-header">
      <span class="schedule-title">定时计划</span>
      <label class="ios-switch mini-switch">
        <input type="checkbox" id="scheduleEnable" onchange="saveSchedule()">
        <span class="slider"></span>
      </label>
    </div>
    
    <div class="time-row">
      <span>开启时间</span>
      <input type="time" id="onTime" class="time-picker" onchange="saveSchedule()">
    </div>
    <div class="time-row">
      <span>关闭时间</span>
      <input type="time" id="offTime" class="time-picker" onchange="saveSchedule()">
    </div>
  </div>
</div>

<script>
  let isProcessing = false;

  async function syncState() {
    if (isProcessing) return;
    try {
      const res = await fetch('/api/status');
      const data = await res.json();
      updateUI(data.on);
      updateScheduleUI(data.schedule);
    } catch (e) {
      console.error('Sync failed', e);
    }
  }

  function updateUI(isOn) {
    document.getElementById('powerSwitch').checked = isOn;
    document.getElementById('deviceIcon').innerText = isOn ? '🚰' : '💤';
  }

  function updateScheduleUI(schedule) {
    if (!schedule) return;
    document.getElementById('onTime').value = schedule.onTime || "";
    document.getElementById('offTime').value = schedule.offTime || "";
    document.getElementById('scheduleEnable').checked = schedule.enabled;
  }

  async function handleToggle() {
    if (isProcessing) return;
    isProcessing = true;
    document.getElementById('loader').style.display = 'flex';
    try {
      const res = await fetch('/api/toggle', { method: 'POST' });
      const data = await res.json();
      updateUI(data.on);
    } catch (e) {
      alert('控制失败');
      syncState();
    } finally {
      isProcessing = false;
      document.getElementById('loader').style.display = 'none';
    }
  }

  async function saveSchedule() {
    const data = {
      onTime: document.getElementById('onTime').value,
      offTime: document.getElementById('offTime').value,
      enabled: document.getElementById('scheduleEnable').checked
    };
    try {
      await fetch('/api/schedule', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
    } catch (e) {
      console.error('Failed to save schedule');
    }
  }

  syncState();
  setInterval(syncState, 5000);
</script>

</body>
</html>
