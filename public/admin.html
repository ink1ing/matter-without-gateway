<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理面板 - HomeKit Anywhere</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #060b14; --surface: #0d1726; --card: #111e33;
      --border: rgba(255,255,255,0.07); --accent: #3b82f6;
      --accent2: #06b6d4; --on-color: #22c55e;
      --text: #e2e8f0; --muted: #64748b; --radius: 20px;
    }
    html, body { min-height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 20% 10%, rgba(59,130,246,0.10) 0%, transparent 60%),
                  radial-gradient(ellipse 60% 50% at 80% 80%, rgba(6,182,212,0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .page {
      position: relative; z-index: 1;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 32px 16px; gap: 20px;
    }
    .card {
      width: 100%; max-width: 460px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 36px 32px;
      box-shadow: 0 0 40px rgba(59,130,246,0.2), 0 24px 64px rgba(0,0,0,0.5);
    }
    .header { text-align: center; margin-bottom: 28px; }
    .logo {
      width: 52px; height: 52px; border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 24px; box-shadow: 0 6px 20px rgba(59,130,246,0.4);
      margin-bottom: 12px;
    }
    h1 { font-size: 1.2rem; font-weight: 600; }
    .subtitle { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }

    label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; font-weight: 500; letter-spacing: 0.04em; }
    .field { margin-bottom: 16px; }
    input[type="password"], input[type="text"] {
      width: 100%; padding: 11px 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-family: 'Inter', sans-serif;
      font-size: 0.88rem; outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }
    .btn-gen {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, var(--accent), #2563eb);
      border: none; border-radius: 12px;
      color: #fff; font-family: 'Inter', sans-serif;
      font-size: 0.92rem; font-weight: 600; cursor: pointer;
      box-shadow: 0 4px 18px rgba(59,130,246,0.35);
      transition: all 0.2s;
    }
    .btn-gen:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(59,130,246,0.45); }
    .btn-gen:active { transform: translateY(0); }
    .btn-gen:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* QR result */
    .result { margin-top: 28px; text-align: center; display: none; }
    .result.show { display: block; }
    .result img {
      width: 200px; height: 200px; border-radius: 16px;
      border: 3px solid var(--accent); margin: 0 auto 16px;
      display: block; box-shadow: 0 0 30px rgba(59,130,246,0.3);
    }
    .result-url {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px; margin-bottom: 12px; overflow: hidden;
    }
    .result-url span {
      flex: 1; font-size: 0.75rem; color: var(--muted);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .copy-btn {
      background: var(--accent); border: none; border-radius: 6px;
      color: #fff; font-size: 0.7rem; font-weight: 600; padding: 4px 10px; cursor: pointer;
      flex-shrink: 0; transition: opacity 0.2s;
    }
    .copy-btn:hover { opacity: 0.85; }
    .expiry-badge {
      display: inline-block; background: rgba(34,197,94,0.12);
      border: 1px solid rgba(34,197,94,0.3); color: #4ade80;
      border-radius: 99px; font-size: 0.72rem; font-weight: 500;
      padding: 3px 12px; margin-top: 4px;
    }

    .error-msg { color: #f87171; font-size: 0.8rem; text-align: center; margin-top: 10px; display: none; }
    .footer { font-size: 0.7rem; color: var(--muted); text-align: center; max-width: 460px; }
    .footer a { color: var(--accent); text-decoration: none; }

    /* download btn */
    .dl-btn {
      display: inline-block; margin-top: 10px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 7px 16px; color: var(--muted);
      font-size: 0.75rem; font-weight: 500; text-decoration: none; cursor: pointer;
      transition: all 0.2s;
    }
    .dl-btn:hover { color: var(--text); border-color: var(--accent); }
  </style>
</head>
<body>
<div class="page">
  <div class="card">
    <div class="header">
      <div class="logo">⚙</div>
      <h1>管理面板</h1>
      <p class="subtitle">生成访客访问凭证与二维码</p>
    </div>

    <div class="field">
      <label for="secretInput">管理员密钥（ADMIN_SECRET）</label>
      <input type="password" id="secretInput" placeholder="输入你在 .env 中设置的密钥" autocomplete="current-password" />
    </div>

    <button class="btn-gen" id="genBtn" onclick="generate()">生成二维码</button>
    <div class="error-msg" id="errMsg"></div>

    <div class="result" id="result">
      <img id="qrImg" src="" alt="QR Code" />
      <div class="result-url">
        <span id="urlText"></span>
        <button class="copy-btn" onclick="copyUrl()">复制</button>
      </div>
      <div class="expiry-badge" id="expiryBadge"></div>
      <br/>
      <a class="dl-btn" id="dlBtn" download="plug-qr.png">下载二维码图片</a>
    </div>
  </div>

  <div class="footer">
    访客扫码后可在有效期内控制设备，Token 过期自动失效。<br/>
    <a href="/">访问控制页面</a>
  </div>
</div>

<script>
  async function generate() {
    const secret = document.getElementById('secretInput').value.trim();
    if (!secret) { showError('请输入管理员密钥'); return; }

    const btn = document.getElementById('genBtn');
    btn.disabled = true;
    btn.textContent = '生成中…';
    hideError();

    try {
      const res = await fetch('/api/admin/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ secret }),
      });
      if (res.status === 403) { showError('密钥错误，请检查 .env 中的 ADMIN_SECRET'); return; }
      if (!res.ok) { showError('服务器错误，请重试'); return; }

      const data = await res.json();
      const qrImg = document.getElementById('qrImg');
      qrImg.src = data.qrDataUrl;

      const urlEl = document.getElementById('urlText');
      urlEl.textContent = data.controlUrl;

      const badge = document.getElementById('expiryBadge');
      const exp = new Date(data.expiresAt);
      badge.textContent = `有效期至 ${exp.toLocaleString('zh-CN')}`;

      // set download link
      const dl = document.getElementById('dlBtn');
      dl.href = data.qrDataUrl;

      document.getElementById('result').classList.add('show');
    } catch (e) {
      showError('无法连接到服务器');
    } finally {
      btn.disabled = false;
      btn.textContent = '生成二维码';
    }
  }

  function copyUrl() {
    const url = document.getElementById('urlText').textContent;
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = '已复制!';
      setTimeout(() => btn.textContent = '复制', 1500);
    });
  }

  function showError(msg) { const el = document.getElementById('errMsg'); el.textContent = msg; el.style.display = 'block'; }
  function hideError() { document.getElementById('errMsg').style.display = 'none'; }

  // Allow pressing Enter in the secret field
  document.getElementById('secretInput').addEventListener('keydown', e => { if (e.key === 'Enter') generate(); });
</script>
</body>
</html>
